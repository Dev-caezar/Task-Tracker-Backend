<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Account</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f9fafb;
      font-family: &quot;Ubuntu&quot;, Arial, sans-serif;
    "
  >
    <table width="100%" border="0" cellspacing="0" cellpadding="0">
      <tr>
        <td align="center" style="padding: 40px 20px">
          <table
            width="320"
            border="0"
            cellspacing="0"
            cellpadding="0"
            style="
              background-color: #ffffff;
              border: 1px solid #f3f4f6;
              border-radius: 8px;
              box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            "
          >
            <tr>
              <td align="center" style="padding: 32px">
                <div
                  style="
                    background-color: #f5f3ff;
                    width: 48px;
                    height: 48px;
                    line-height: 48px;
                    border-radius: 12px;
                    margin-bottom: 20px;
                  "
                >
                  <span style="font-size: 24px">🔐</span>
                </div>

                <h2
                  style="
                    margin: 0;
                    color: #111827;
                    font-size: 20px;
                    font-weight: 700;
                    letter-spacing: -0.5px;
                  "
                >
                  Verify your account
                </h2>
                <p
                  style="
                    margin: 12px 0 24px 0;
                    color: #6b7280;
                    font-size: 13px;
                    line-height: 1.5;
                  "
                >
                  To finish setting up your account, enter the following code in
                  the app.
                </p>

                <div
                  style="
                    background-color: #f9fafb;
                    border: 1px dashed #e5e7eb;
                    border-radius: 8px;
                    padding: 16px;
                    margin-bottom: 24px;
                  "
                >
                  <h1
                    style="
                      margin: 0;
                      color: #7c3aed;
                      font-size: 32px;
                      font-weight: 800;
                      letter-spacing: 8px;
                      text-indent: 8px;
                    "
                  >
                    {{OTP}}
                  </h1>
                </div>

                <p
                  style="
                    margin: 0;
                    color: #9ca3af;
                    font-size: 11px;
                    font-weight: 500;
                  "
                >
                  This code expires in
                  <span style="color: #111827; font-weight: 700"
                    >10 minutes</span
                  >.
                </p>

                <table
                  width="100%"
                  border="0"
                  cellspacing="0"
                  cellpadding="0"
                  style="margin-top: 32px; border-top: 1px solid #f3f4f6"
                >
                  <tr>
                    <td align="center" style="padding-top: 20px">
                      <p
                        style="
                          margin: 0;
                          color: #9ca3af;
                          font-size: 10px;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                        "
                      >
                        Secured by Taskly
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
